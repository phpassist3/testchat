# Конфиг nginx ВНУТРИ контейнера frontend.
# Отдаёт собранную статику React (SPA). Проксированием API и WS занимается
# внешний (хостовый) nginx — это делает архитектуру предсказуемой.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-fallback: любые неизвестные пути отдают index.html,
    # чтобы работал клиентский роутинг.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кешируем статику агрессивно, кроме index.html
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Не кешируем index.html, чтобы новые билды сразу подхватывались
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
