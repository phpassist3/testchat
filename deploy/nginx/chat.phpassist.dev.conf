# Конфиг хостового nginx для домена chat.phpassist.dev.
# Проксирует HTTPS на локальные порты docker-compose:
#   /        -> frontend (web, порт 8080)
#   /api/    -> backend  (api, порт 4000)
#   /ws      -> backend  (api, порт 4000, WebSocket upgrade)
# SSL-сертификат получает certbot (этот файл — финальная версия, после того
# как ssl-сертификаты уже выпущены).

# Доп. блок для корректного апгрейда на WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP: редирект на HTTPS (кроме webroot certbot)
server {
    listen 80;
    listen [::]:80;
    server_name chat.phpassist.dev;

    # Путь для http-01 challenge certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: собственно приложение
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.phpassist.dev;

    ssl_certificate     /etc/letsencrypt/live/chat.phpassist.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.phpassist.dev/privkey.pem;

    # Современные TLS-настройки (без зависимости от certbot-nginx)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Разумные заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Максимальный размер тела запроса (для REST API)
    client_max_body_size 1m;

    # --- API (Express) ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- WebSocket ---
    location /ws {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Долгие WS-соединения
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Frontend (React SPA в отдельном nginx-контейнере) ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
