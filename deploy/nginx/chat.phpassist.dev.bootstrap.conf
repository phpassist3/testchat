# Начальный (bootstrap) конфиг хостового nginx для домена chat.phpassist.dev.
# Используется ТОЛЬКО в момент первичного получения сертификата certbot.
# После выпуска SSL он заменяется на основной chat.phpassist.dev.conf.
server {
    listen 80;
    listen [::]:80;
    server_name chat.phpassist.dev;

    # Путь для http-01 challenge certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # На всякий случай — простой ответ, чтобы видеть, что nginx отвечает
    location / {
        return 200 "chat.phpassist.dev bootstrap ok\n";
        add_header Content-Type text/plain;
    }
}
